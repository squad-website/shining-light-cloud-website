<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Member</title>
    <link rel="stylesheet" href="../../assets/css/member-card.css">
    <link rel="stylesheet" href="../../assets/css/beranda/global.css">
    <link rel="icon" href="../../assets/img/favicon.ico">
</head>
<body>

<header class="navbar">
    <h1 class="logo">Shining Light Cloud</h1>
    <a href="member-list.html" class="back-btn">Kembali</a>
</header>

<div class="wrapper">

    <!-- ✨ CARD dengan ID → agar JS bisa pasang tier-nya -->
    <div id="card" class="card-container" data-tier="">

        <!-- 🔥 Badge tier (diisi otomatis lewat CSS berdasarkan data-tier) -->
        <div class="tier-badge"></div>

        <!-- 🖼 Foto Profil -->
        <div class="photo">
            <img id="photo" src="">
        </div>

        <!-- 👤 Nama -->
        <h2 class="name" id="name"></h2>

        <!-- 📊 Info Table -->
        <table class="info-table">
            <tr><td>Role</td><td id="role"></td></tr>
            <tr><td>Point</td><td id="point"></td></tr>
            <tr><td>Tier</td><td id="tier"></td></tr>
        </table>

    </div>

</div>

<!-- JS -->
<script type="module" src="../../assets/js/member-card.js"></script>

</body>
</html>
