<!DOCTYPE html>
<html lang="id">

    <link rel="icon" href="../assets/img/favicon.ico">

    <!-- GLOBAL (NAVBAR DI SINI) -->

    <!-- KHUSUS HALAMAN RANKING -->

<body>

<!-- NAVBAR -->
<nav class="navbar">

    </div>
